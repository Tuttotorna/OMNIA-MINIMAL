name: OMNIA-MINIMAL CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  minimal-demo:
    name: Run minimal OMNIA demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run minimal demo
        run: |
          python examples/run_minimal_demo.py

      - name: Run tests
        run: |
          pytest -q
